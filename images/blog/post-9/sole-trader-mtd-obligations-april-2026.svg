<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sole trader checking their MTD obligations from April 2026</title>
  <desc>Hero illustration showing a sole trader at a desk with a laptop and bank statements, with the headline Making Tax Digital April 2026</desc>

  <!-- Background -->
  <rect width="800" height="420" fill="#F8FAFC"/>

  <!-- Header band -->
  <rect width="800" height="56" fill="#2A8A6E"/>
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="white">Making Tax Digital: April 2026</text>

  <!-- Desk surface -->
  <rect x="120" y="260" width="560" height="12" rx="4" fill="#D1DCE6"/>

  <!-- Laptop body -->
  <rect x="310" y="160" width="200" height="130" rx="6" fill="#2C3E50"/>
  <rect x="316" y="166" width="188" height="114" rx="3" fill="#1A6FA8"/>
  <!-- Screen content lines -->
  <rect x="326" y="176" width="110" height="8" rx="2" fill="white" opacity="0.8"/>
  <rect x="326" y="192" width="80" height="6" rx="2" fill="white" opacity="0.6"/>
  <rect x="326" y="206" width="140" height="6" rx="2" fill="white" opacity="0.5"/>
  <rect x="326" y="220" width="100" height="6" rx="2" fill="white" opacity="0.5"/>
  <rect x="326" y="236" width="120" height="6" rx="2" fill="white" opacity="0.5"/>
  <!-- Teal highlight on screen -->
  <rect x="326" y="252" width="168" height="20" rx="3" fill="#2A8A6E"/>
  <text x="410" y="266" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="white" font-weight="600">MTD Compliant ✓</text>
  <!-- Laptop base -->
  <rect x="290" y="290" width="240" height="10" rx="4" fill="#2C3E50"/>

  <!-- Bank statement papers -->
  <rect x="160" y="210" width="130" height="60" rx="4" fill="white" stroke="#D1DCE6" stroke-width="1.5"/>
  <rect x="165" y="218" width="90" height="6" rx="2" fill="#D1DCE6"/>
  <rect x="165" y="230" width="70" height="5" rx="2" fill="#D1DCE6"/>
  <rect x="165" y="241" width="110" height="5" rx="2" fill="#D1DCE6"/>
  <rect x="165" y="252" width="80" height="5" rx="2" fill="#D1DCE6"/>
  <text x="175" y="215" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#4A5568" font-weight="600">BANK STATEMENT</text>

  <!-- Second paper (stacked) -->
  <rect x="155" y="205" width="130" height="60" rx="4" fill="#F0F4F8" stroke="#D1DCE6" stroke-width="1"/>

  <!-- Person silhouette -->
  <!-- Head -->
  <circle cx="480" cy="155" r="24" fill="#4A5568"/>
  <!-- Body -->
  <rect x="454" y="178" width="52" height="70" rx="10" fill="#2A8A6E"/>
  <!-- Arms -->
  <rect x="418" y="188" width="36" height="14" rx="7" fill="#4A5568"/>
  <rect x="508" y="188" width="36" height="14" rx="7" fill="#4A5568"/>
  <!-- Hands on keyboard -->
  <ellipse cx="440" cy="200" rx="10" ry="7" fill="#C9A87C"/>
  <ellipse cx="543" cy="200" rx="10" ry="7" fill="#C9A87C"/>

  <!-- Alert badge -->
  <rect x="546" y="148" width="160" height="50" rx="8" fill="#FEF3CD" stroke="#F6C90E" stroke-width="1.5"/>
  <text x="626" y="168" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#856404">⚠ In scope from</text>
  <text x="626" y="186" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#856404">6 April 2026</text>

  <!-- Income badge -->
  <rect x="90" y="148" width="160" height="50" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="170" y="168" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#1F6E57">Income over</text>
  <text x="170" y="186" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#1F6E57">£50,000?</text>

  <!-- Subtitle -->
  <text x="400" y="360" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#4A5568">Are you mandated? What are the deadlines? What do you actually need to do?</text>

  <!-- Decorative bottom rule -->
  <rect x="160" y="378" width="480" height="2" rx="1" fill="#D1DCE6"/>

  <!-- Watermark -->
  <text x="786" y="412" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#D1DCE6">mtdprep.co.uk</text>
</svg>
