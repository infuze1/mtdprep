<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How MTDPrep works: upload, categorise, export for MTD</title>
  <desc>Three-step workflow diagram: Upload Bank Statement PDF, AI Extracts and Categorises, Export to Bridging Software</desc>

  <!-- Background -->
  <rect width="900" height="320" fill="#F8FAFC"/>

  <!-- Header band -->
  <rect width="900" height="56" fill="#2A8A6E"/>
  <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="white">How MTDPrep Gets You MTD-Ready</text>

  <!-- Step 1 box -->
  <rect x="50" y="90" width="220" height="180" rx="10" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="160" cy="110" r="18" fill="#2A8A6E"/>
  <text x="160" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="white">1</text>
  <!-- PDF icon -->
  <rect x="130" y="132" width="60" height="70" rx="4" fill="#F8FAFC" stroke="#D1DCE6" stroke-width="1.5"/>
  <rect x="130" y="132" width="60" height="16" rx="4" fill="#E53E3E"/>
  <text x="160" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="white">PDF</text>
  <line x1="140" y1="162" x2="180" y2="162" stroke="#D1DCE6" stroke-width="1.5"/>
  <line x1="140" y1="174" x2="175" y2="174" stroke="#D1DCE6" stroke-width="1.5"/>
  <line x1="140" y1="186" x2="170" y2="186" stroke="#D1DCE6" stroke-width="1.5"/>
  <text x="160" y="222" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2C3E50">Upload Bank</text>
  <text x="160" y="240" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2C3E50">Statement PDF</text>
  <text x="160" y="258" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#4A5568">HSBC PDF — v1</text>

  <!-- Arrow 1→2 -->
  <polygon points="292,178 318,168 318,188" fill="#2A8A6E"/>
  <line x1="270" y1="178" x2="318" y2="178" stroke="#2A8A6E" stroke-width="2.5"/>

  <!-- Step 2 box -->
  <rect x="340" y="90" width="220" height="180" rx="10" fill="#2A8A6E" stroke="#1F6E57" stroke-width="2"/>
  <circle cx="450" cy="110" r="18" fill="white"/>
  <text x="450" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#2A8A6E">2</text>
  <circle cx="450" cy="165" r="32" fill="#1F6E57"/>
  <text x="450" y="160" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="white" font-weight="700">AI</text>
  <text x="450" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#B8E6D8">extracts &amp;</text>
  <text x="450" y="187" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#B8E6D8">categorises</text>
  <text x="450" y="218" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="white">AI Extracts &amp;</text>
  <text x="450" y="236" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="white">Categorises</text>
  <text x="450" y="254" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#B8E6D8">HMRC categories</text>

  <!-- Arrow 2→3 -->
  <polygon points="582,178 608,168 608,188" fill="#2A8A6E"/>
  <line x1="560" y1="178" x2="608" y2="178" stroke="#2A8A6E" stroke-width="2.5"/>

  <!-- Step 3 box -->
  <rect x="630" y="90" width="220" height="180" rx="10" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="740" cy="110" r="18" fill="#2A8A6E"/>
  <text x="740" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="white">3</text>
  <rect x="710" y="132" width="60" height="70" rx="4" fill="#F8FAFC" stroke="#D1DCE6" stroke-width="1.5"/>
  <rect x="710" y="132" width="60" height="16" rx="4" fill="#1F6E57"/>
  <text x="740" y="145" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="white">XLSX / CSV</text>
  <line x1="720" y1="162" x2="760" y2="162" stroke="#D1DCE6" stroke-width="1.5"/>
  <line x1="720" y1="174" x2="755" y2="174" stroke="#D1DCE6" stroke-width="1.5"/>
  <line x1="720" y1="186" x2="750" y2="186" stroke="#D1DCE6" stroke-width="1.5"/>
  <text x="740" y="222" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2C3E50">Export to Bridging</text>
  <text x="740" y="240" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#2C3E50">Software</text>
  <text x="740" y="258" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#4A5568">123 Sheets · Absolute · VT</text>

  <!-- Bottom tagline -->
  <text x="450" y="294" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#4A5568">No accounting software required. No HMRC direct submission. MTD-ready export in minutes.</text>

  <!-- Watermark -->
  <text x="886" y="313" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#D1DCE6">mtdprep.co.uk</text>
</svg>
