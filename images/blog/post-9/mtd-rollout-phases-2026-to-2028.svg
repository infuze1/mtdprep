<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Making Tax Digital rollout phases 2026 to 2028 by income threshold</title>
  <desc>Timeline showing the three MTD ITSA mandation phases: April 2026 over £50,000, April 2027 over £30,000, April 2028 over £20,000</desc>

  <!-- Background -->
  <rect width="900" height="380" fill="#F8FAFC"/>

  <!-- Header band -->
  <rect width="900" height="56" fill="#2A8A6E"/>
  <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" fill="white">Making Tax Digital for Income Tax — Phased Rollout</text>

  <!-- Timeline spine -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="#2A8A6E" stroke-width="3"/>

  <!-- Arrowhead -->
  <polygon points="820,194 836,200 820,206" fill="#2A8A6E"/>

  <!-- PHASE 1 -->
  <line x1="210" y1="150" x2="210" y2="200" stroke="#2A8A6E" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="210" cy="200" r="9" fill="#2A8A6E"/>
  <circle cx="210" cy="200" r="5" fill="white"/>
  <rect x="110" y="78" width="200" height="72" rx="8" fill="#2A8A6E"/>
  <text x="210" y="100" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="white">April 2026</text>
  <text x="210" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="white">Income over £50,000</text>
  <text x="210" y="136" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#B8E6D8">~780,000 people</text>
  <text x="210" y="226" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4A5568">Phase 1</text>
  <rect x="148" y="245" width="124" height="26" rx="5" fill="#2A8A6E"/>
  <text x="210" y="263" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="white">LIVE NOW</text>

  <!-- PHASE 2 -->
  <line x1="450" y1="150" x2="450" y2="200" stroke="#1A6FA8" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="450" cy="200" r="9" fill="#1A6FA8"/>
  <circle cx="450" cy="200" r="5" fill="white"/>
  <rect x="350" y="78" width="200" height="72" rx="8" fill="#1A6FA8"/>
  <text x="450" y="100" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="white">April 2027</text>
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="white">Income over £30,000</text>
  <text x="450" y="136" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#B8D4F0">~970,000 more</text>
  <text x="450" y="226" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4A5568">Phase 2</text>
  <rect x="388" y="245" width="124" height="26" rx="5" fill="#1A6FA8"/>
  <text x="450" y="263" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="white">Coming 2027</text>

  <!-- PHASE 3 -->
  <line x1="690" y1="150" x2="690" y2="200" stroke="#4A5568" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="690" cy="200" r="9" fill="#4A5568"/>
  <circle cx="690" cy="200" r="5" fill="white"/>
  <rect x="590" y="78" width="200" height="72" rx="8" fill="#4A5568"/>
  <text x="690" y="100" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="700" fill="white">April 2028</text>
  <text x="690" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="white">Income over £20,000</text>
  <text x="690" y="136" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#B0BAC4">~500,000 more</text>
  <text x="690" y="226" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4A5568">Phase 3</text>
  <rect x="628" y="245" width="124" height="26" rx="5" fill="#4A5568"/>
  <text x="690" y="263" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="white">Coming 2028</text>

  <!-- Total callout box -->
  <rect x="280" y="298" width="340" height="46" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="450" y="319" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#1F6E57">Total by 2028: ~2.25 million sole traders</text>
  <text x="450" y="337" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4A5568">and landlords mandated for MTD ITSA</text>

  <!-- Watermark -->
  <text x="886" y="372" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#D1DCE6">mtdprep.co.uk</text>
</svg>
