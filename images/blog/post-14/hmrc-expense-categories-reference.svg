<svg viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Arial, sans-serif">
<title>HMRC self-employment expense categories for Making Tax Digital quarterly updates</title>
<desc>Grid of the main HMRC self-employment expense categories, each with an everyday example.</desc>
<rect width="860" height="470" fill="#F8FAFC"/>
<rect x="0" y="0" width="860" height="56" fill="#2A8A6E"/>
<text x="24" y="35" font-size="20" font-weight="600" fill="#FFFFFF">HMRC expense categories your quarterly update needs</text>

<rect x="30" y="88" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="46" y="118" font-size="14" font-weight="600" fill="#1F6E57">Cost of goods</text>
<text x="46" y="144" font-size="12" fill="#4A5568">Stock, materials, parts</text>

