<text x="318" y="144" font-size="12" fill="#4A5568">Fuel, insurance, servicing</text>

<rect x="574" y="88" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="590" y="118" font-size="14" font-weight="600" fill="#1F6E57">Travel and subsistence</text>
<text x="590" y="144" font-size="12" fill="#4A5568">Rail fares, parking, hotels</text>

<rect x="30" y="184" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="46" y="214" font-size="14" font-weight="600" fill="#1F6E57">Premises costs</text>
<text x="46" y="240" font-size="12" fill="#4A5568">Rent, utilities, rates</text>

<rect x="302" y="184" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="318" y="214" font-size="14" font-weight="600" fill="#1F6E57">Repairs and maintenance</text>
<text x="318" y="240" font-size="12" fill="#4A5568">Property and kit repairs</text>

<rect x="574" y="184" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="590" y="214" font-size="14" font-weight="600" fill="#1F6E57">Office costs</text>
<text x="590" y="240" font-size="12" fill="#4A5568">Stationery, phone, software</text>

<rect x="30" y="280" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="46" y="310" font-size="14" font-weight="600" fill="#1F6E57">Advertising</text>
<text x="46" y="336" font-size="12" fill="#4A5568">Ads, website, flyers</text>

<rect x="302" y="280" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="318" y="310" font-size="14" font-weight="600" fill="#1F6E57">Professional fees</text>
<text x="318" y="336" font-size="12" fill="#4A5568">Bookkeeper, solicitor</text>

<rect x="574" y="280" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="590" y="310" font-size="14" font-weight="600" fill="#1F6E57">Interest and charges</text>
<text x="590" y="336" font-size="12" fill="#4A5568">Loan interest, bank fees</text>

<rect x="30" y="376" width="256" height="82" rx="6" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
