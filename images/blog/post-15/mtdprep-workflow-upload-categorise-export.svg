<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="900" height="340" fill="#F8FAFC"/>
  <rect x="0" y="0" width="900" height="56" fill="#2A8A6E"/>
  <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="600" fill="#FFFFFF">From bank statement to MTD-ready spreadsheet</text>

  <rect x="30" y="100" width="230" height="160" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="145" cy="136" r="20" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="2"/>
  <text x="145" y="143" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1F6E57">1</text>
  <text x="145" y="184" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#2C3E50">Upload</text>
  <text x="145" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">Your PDF bank statement,</text>
  <text x="145" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">straight from online banking.</text>
  <text x="145" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">No bank feed required.</text>

  <line x1="272" y1="180" x2="318" y2="180" stroke="#2A8A6E" stroke-width="3"/>
  <path d="M 318 180 L 306 173 L 306 187 Z" fill="#2A8A6E"/>

  <rect x="335" y="100" width="230" height="160" rx="8" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="450" cy="136" r="20" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="2"/>
  <text x="450" y="143" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1F6E57">2</text>
  <text x="450" y="184" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#2C3E50">AI categorises</text>
  <text x="450" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">Every transaction sorted into</text>
  <text x="450" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">HMRC expense categories.</text>
  <text x="450" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">You review and correct.</text>

  <line x1="577" y1="180" x2="623" y2="180" stroke="#2A8A6E" stroke-width="3"/>
  <path d="M 623 180 L 611 173 L 611 187 Z" fill="#2A8A6E"/>

  <rect x="640" y="100" width="230" height="160" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="755" cy="136" r="20" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="2"/>
  <text x="755" y="143" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1F6E57">3</text>
  <text x="755" y="184" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" fill="#2C3E50">Export</text>
  <text x="755" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">A spreadsheet ready for</text>
  <text x="755" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">123 Sheets, Absolute Excel</text>
  <text x="755" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">or VT bridging software.</text>

  <rect x="30" y="284" width="840" height="34" rx="6" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1"/>
  <text x="450" y="306" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#1F6E57">MTDPrep does not submit to HMRC — your bridging software does that. No accounting suite needed.</text>

  <text x="890" y="332" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#D1DCE6">mtdprep.co.uk</text>
</svg>
