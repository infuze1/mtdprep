<svg viewBox="0 0 800 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Arial, sans-serif">
<title>Who is mandated for Making Tax Digital and when</title>
<rect width="800" height="470" fill="#F8FAFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2A8A6E"/>
<text x="32" y="41" fill="#FFFFFF" font-size="23" font-weight="700">Who is mandated for MTD — and when</text>
<rect x="500" y="82" width="18" height="18" rx="4" fill="#2A8A6E"/>
<text x="524" y="96" fill="#4A5568" font-size="13">Mandated</text>
<rect x="620" y="82" width="18" height="18" rx="4" fill="#B7C2CE"/>
<text x="644" y="96" fill="#4A5568" font-size="13">Deferred</text>
<rect x="32" y="118" width="736" height="94" rx="10" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
<rect x="32" y="118" width="10" height="94" rx="5" fill="#2A8A6E"/>
<text x="60" y="150" fill="#2C3E50" font-size="18" font-weight="700">Sole traders &amp; landlords</text>
<text x="60" y="176" fill="#4A5568" font-size="14">Mandated in three phases by qualifying income band:</text>
<text x="60" y="198" fill="#1F6E57" font-size="14" font-weight="600">April 2026 (over £50k) · April 2027 (over £30k) · April 2028 (over £20k)</text>
<rect x="32" y="224" width="736" height="94" rx="10" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
<rect x="32" y="224" width="10" height="94" rx="5" fill="#2A8A6E"/>
<text x="60" y="256" fill="#2C3E50" font-size="18" font-weight="700">Individual partners with own-name income</text>
<text x="60" y="282" fill="#4A5568" font-size="14">Mandated on their SOLE-TRADE or RENTAL income only —</text>
<text x="60" y="304" fill="#4A5568" font-size="14">the partnership share does not count towards the threshold.</text>
<rect x="32" y="330" width="736" height="94" rx="10" fill="#EEF2F6" stroke="#B7C2CE" stroke-width="2"/>
<rect x="32" y="330" width="10" height="94" rx="5" fill="#B7C2CE"/>
<text x="60" y="362" fill="#2C3E50" font-size="18" font-weight="700">Partnerships as an entity</text>
<text x="60" y="388" fill="#4A5568" font-size="14">General, limited and LLPs — no start date set. Deferred</text>
<text x="60" y="410" fill="#4A5568" font-size="14">indefinitely. Keep filing through Self Assessment for now.</text>
<text x="788" y="458" fill="#D1DCE6" font-size="10" text-anchor="end">mtdprep.co.uk</text>
</svg>