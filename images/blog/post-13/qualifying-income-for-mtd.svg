<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', Arial, sans-serif">
<title>What counts as qualifying income for Making Tax Digital</title>
<rect width="800" height="460" fill="#F8FAFC"/>
<rect x="0" y="0" width="800" height="64" fill="#2A8A6E"/>
<text x="32" y="41" fill="#FFFFFF" font-size="23" font-weight="700">What counts as qualifying income for MTD</text>
<text x="40" y="104" fill="#1F6E57" font-size="15" font-weight="700">COUNTS towards the threshold</text>
<rect x="40" y="118" width="290" height="64" rx="10" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
<text x="60" y="146" fill="#2C3E50" font-size="16" font-weight="600">Sole trade income</text>
<text x="60" y="168" fill="#4A5568" font-size="13">Gross income from self-employment</text>
<rect x="40" y="196" width="290" height="64" rx="10" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
<text x="60" y="224" fill="#2C3E50" font-size="16" font-weight="600">UK property income</text>
<text x="60" y="246" fill="#4A5568" font-size="13">Let in your own name</text>
<line x1="330" y1="150" x2="452" y2="182" stroke="#2A8A6E" stroke-width="3"/>
<line x1="330" y1="228" x2="452" y2="196" stroke="#2A8A6E" stroke-width="3"/>
<polygon points="452,182 442,180 446,190" fill="#2A8A6E"/>
<polygon points="452,196 446,188 442,198" fill="#2A8A6E"/>
<rect x="456" y="150" width="304" height="80" rx="12" fill="#2A8A6E"/>
<text x="608" y="184" fill="#FFFFFF" font-size="18" font-weight="700" text-anchor="middle">Qualifying income</text>
<text x="608" y="210" fill="#D8ECE5" font-size="13" text-anchor="middle">Tested against the MTD thresholds</text>
<text x="40" y="304" fill="#B23A3A" font-size="15" font-weight="700">Does NOT count</text>
<rect x="40" y="318" width="290" height="64" rx="10" fill="#F3E7E7" stroke="#D8A7A7" stroke-width="2"/>
<text x="60" y="346" fill="#2C3E50" font-size="16" font-weight="600">Partnership profit share</text>
<text x="60" y="368" fill="#4A5568" font-size="13">Excluded from the MTD calculation</text>
<line x1="52" y1="326" x2="318" y2="374" stroke="#B23A3A" stroke-width="2.5"/>
<rect x="456" y="270" width="304" height="112" rx="12" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
<text x="608" y="296" fill="#2C3E50" font-size="14" font-weight="700" text-anchor="middle">MTD thresholds</text>
<text x="476" y="324" fill="#1A6FA8" font-size="14" font-weight="600">April 2026</text>
<text x="744" y="324" fill="#4A5568" font-size="14" text-anchor="end">over £50,000</text>
<text x="476" y="350" fill="#1A6FA8" font-size="14" font-weight="600">April 2027</text>
<text x="744" y="350" fill="#4A5568" font-size="14" text-anchor="end">over £30,000</text>
<text x="476" y="376" fill="#1A6FA8" font-size="14" font-weight="600">April 2028</text>
<text x="744" y="376" fill="#4A5568" font-size="14" text-anchor="end">over £20,000</text>
<text x="400" y="426" fill="#4A5568" font-size="14" text-anchor="middle">A partner earning only from the partnership has zero qualifying income</text>
<text x="788" y="448" fill="#D1DCE6" font-size="10" text-anchor="end">mtdprep.co.uk</text>
</svg>