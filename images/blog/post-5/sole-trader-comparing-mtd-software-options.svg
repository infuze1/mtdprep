  <path d="M330 400 L400 260" stroke="#D1DCE6" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M400 260 L520 150" stroke="#D1DCE6" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M400 260 L560 320" stroke="#D1DCE6" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Branch A: subscription software -->
  <rect x="500" y="70" width="240" height="110" rx="10" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="540" cy="105" r="16" fill="#1A6FA8"/>
  <ellipse cx="534" cy="107" rx="6" ry="5" fill="#FFFFFF"/>
  <ellipse cx="542" cy="103" rx="7.5" ry="6.5" fill="#FFFFFF"/>
  <ellipse cx="548" cy="108" rx="5" ry="4" fill="#FFFFFF"/>
  <rect x="531" y="106" width="20" height="6" rx="3" fill="#FFFFFF"/>
