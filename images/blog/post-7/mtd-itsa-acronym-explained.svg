<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="800" height="460" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="60" fill="#2A8A6E"/>
  <text x="30" y="38" font-size="20" font-weight="600" fill="#FFFFFF">MTD ITSA — What the Letters Mean</text>

  <!-- Row 1: MTD -->
  <rect x="40" y="90" width="90" height="60" rx="8" fill="#2A8A6E"/>
  <text x="85" y="130" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">MTD</text>
  <rect x="150" y="90" width="610" height="60" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="1.5"/>
  <text x="175" y="127" font-size="16" font-weight="700" fill="#2C3E50">Making Tax Digital</text>

  <!-- Row 2: I -->
  <rect x="40" y="165" width="90" height="60" rx="8" fill="#1F6E57"/>
  <text x="85" y="205" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">I</text>
  <rect x="150" y="165" width="610" height="60" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="1.5"/>
  <text x="175" y="202" font-size="16" font-weight="700" fill="#2C3E50">for Income Tax</text>

  <!-- Row 3: SA -->
  <rect x="40" y="240" width="90" height="60" rx="8" fill="#1A6FA8"/>
  <text x="85" y="280" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">SA</text>
  <rect x="150" y="240" width="610" height="60" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="1.5"/>
  <text x="175" y="277" font-size="16" font-weight="700" fill="#2C3E50">Self Assessment</text>

  <!-- Note banner -->
  <rect x="40" y="325" width="720" height="90" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="400" y="357" font-size="14" font-weight="700" fill="#1F6E57" text-anchor="middle">HMRC now mostly calls this scheme "MTD for Income Tax"</text>
  <text x="400" y="380" font-size="13" fill="#4A5568" text-anchor="middle">"MTD ITSA" and "MTD for Income Tax" mean exactly the same thing —</text>
  <text x="400" y="400" font-size="13" fill="#4A5568" text-anchor="middle">you may see either term used.</text>

  <text x="770" y="445" font-size="10" fill="#D1DCE6" text-anchor="end">mtdprep.co.uk</text>
</svg>
