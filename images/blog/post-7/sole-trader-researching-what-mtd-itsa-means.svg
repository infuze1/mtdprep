<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="800" height="500" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="60" fill="#2A8A6E"/>
  <text x="30" y="38" font-size="22" font-weight="600" fill="#FFFFFF">What Is MTD ITSA?</text>

  <!-- Table -->
  <rect x="120" y="360" width="560" height="20" rx="4" fill="#D1DCE6"/>
  <rect x="140" y="380" width="20" height="80" fill="#C7D2DC"/>
  <rect x="620" y="380" width="20" height="80" fill="#C7D2DC"/>

  <!-- Chair / person seated -->
  <circle cx="330" cy="230" r="34" fill="#2A8A6E"/>
  <!-- simple face -->
  <circle cx="318" cy="224" r="4" fill="#F8FAFC"/>
  <circle cx="342" cy="224" r="4" fill="#F8FAFC"/>
  <path d="M316 240 Q330 250 344 240" stroke="#F8FAFC" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- body -->
  <path d="M280 360 Q330 270 380 360 Z" fill="#1F6E57"/>
  <!-- arm resting near laptop -->
  <rect x="300" y="330" width="70" height="16" rx="8" fill="#1F6E57"/>

  <!-- Laptop -->
  <rect x="340" y="300" width="160" height="100" rx="6" fill="#2C3E50"/>
  <rect x="352" y="312" width="136" height="76" rx="3" fill="#FFFFFF"/>
  <text x="420" y="345" font-size="14" font-weight="700" fill="#2A8A6E" text-anchor="middle">MTD</text>
  <text x="420" y="363" font-size="14" font-weight="700" fill="#2A8A6E" text-anchor="middle">ITSA?</text>
  <text x="420" y="381" font-size="9" fill="#4A5568" text-anchor="middle">searching...</text>
  <rect x="330" y="398" width="180" height="12" rx="6" fill="#1F6E57"/>

  <!-- Thought bubble with question mark -->
  <circle cx="470" cy="230" r="8" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="490" cy="210" r="12" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="520" cy="175" r="42" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
  <text x="520" y="184" font-size="34" font-weight="700" fill="#2A8A6E" text-anchor="middle">?</text>

  <!-- Tea cup -->
  <rect x="210" y="368" width="42" height="30" rx="4" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <path d="M252 375 q14 2 14 14 q0 12 -14 10" fill="none" stroke="#D1DCE6" stroke-width="3"/>
  <ellipse cx="231" cy="368" rx="21" ry="5" fill="#1A6FA8" opacity="0.35"/>

  <!-- Folder of paperwork -->
  <rect x="560" y="350" width="70" height="50" rx="4" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="2"/>
  <rect x="568" y="342" width="40" height="14" rx="3" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="2"/>
  <line x1="572" y1="368" x2="618" y2="368" stroke="#2A8A6E" stroke-width="2"/>
  <line x1="572" y1="380" x2="612" y2="380" stroke="#2A8A6E" stroke-width="2"/>

  <text x="770" y="490" font-size="10" fill="#D1DCE6" text-anchor="end">mtdprep.co.uk</text>
</svg>
