<svg viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',Arial,sans-serif;background:#F8FAFC;">
  <title>Making Tax Digital Income Thresholds for Landlords 2026 to 2028</title>
  <rect width="800" height="430" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="72" fill="#2A8A6E"/>
  <text x="400" y="30" text-anchor="middle" fill="white" font-size="13" font-weight="600" letter-spacing="1.5">MAKING TAX DIGITAL FOR INCOME TAX</text>
  <text x="400" y="55" text-anchor="middle" fill="#B2DFCF" font-size="20" font-weight="700">Who's affected and when?</text>
  <line x1="140" y1="250" x2="660" y2="250" stroke="#D1DCE6" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="140" cy="250" r="10" fill="#2A8A6E"/>
  <rect x="30" y="92" width="220" height="134" rx="10" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <rect x="30" y="92" width="220" height="8" rx="4" fill="#2A8A6E"/>
  <text x="140" y="132" text-anchor="middle" fill="#2A8A6E" font-size="24" font-weight="800">£50,000+</text>
  <text x="140" y="153" text-anchor="middle" fill="#4A5568" font-size="12">combined income</text>
  <line x1="54" y1="167" x2="226" y2="167" stroke="#D1DCE6" stroke-width="1"/>
  <text x="140" y="189" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="600">~180,000 landlords</text>
  <text x="140" y="208" text-anchor="middle" fill="#4A5568" font-size="11">already in scope</text>
  <rect x="86" y="268" width="108" height="28" rx="14" fill="#2A8A6E"/>
  <text x="140" y="286" text-anchor="middle" fill="white" font-size="12" font-weight="700">April 2026</text>
  <circle cx="400" cy="250" r="10" fill="#1A6FA8"/>
  <rect x="290" y="92" width="220" height="134" rx="10" fill="white" stroke="#1A6FA8" stroke-width="2"/>
  <rect x="290" y="92" width="220" height="8" rx="4" fill="#1A6FA8"/>
  <text x="400" y="132" text-anchor="middle" fill="#1A6FA8" font-size="24" font-weight="800">£30,000+</text>
  <text x="400" y="153" text-anchor="middle" fill="#4A5568" font-size="12">combined income</text>
  <line x1="314" y1="167" x2="486" y2="167" stroke="#D1DCE6" stroke-width="1"/>
  <text x="400" y="189" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="600">+200,000 landlords</text>
  <text x="400" y="208" text-anchor="middle" fill="#4A5568" font-size="11">added to scope</text>
  <rect x="346" y="268" width="108" height="28" rx="14" fill="#1A6FA8"/>
  <text x="400" y="286" text-anchor="middle" fill="white" font-size="12" font-weight="700">April 2027</text>
  <circle cx="660" cy="250" r="10" fill="#1F6E57"/>
  <rect x="550" y="92" width="220" height="134" rx="10" fill="white" stroke="#1F6E57" stroke-width="2"/>
  <rect x="550" y="92" width="220" height="8" rx="4" fill="#1F6E57"/>
  <text x="660" y="132" text-anchor="middle" fill="#1F6E57" font-size="24" font-weight="800">£20,000+</text>
  <text x="660" y="153" text-anchor="middle" fill="#4A5568" font-size="12">combined income</text>
  <line x1="574" y1="167" x2="746" y2="167" stroke="#D1DCE6" stroke-width="1"/>
  <text x="660" y="189" text-anchor="middle" fill="#2C3E50" font-size="12" font-weight="600">+120,000 landlords</text>
  <text x="660" y="208" text-anchor="middle" fill="#4A5568" font-size="11">added to scope</text>
  <rect x="606" y="268" width="108" height="28" rx="14" fill="#1F6E57"/>
  <text x="660" y="286" text-anchor="middle" fill="white" font-size="12" font-weight="700">April 2028</text>
  <rect x="160" y="318" width="480" height="68" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="400" y="344" text-anchor="middle" fill="#1F6E57" font-size="14" font-weight="700">~500,000 UK landlords in scope by 2028</text>
  <text x="400" y="366" text-anchor="middle" fill="#4A5568" font-size="11">Threshold based on combined self-employment</text>
  <text x="400" y="382" text-anchor="middle" fill="#4A5568" font-size="11">and property income</text>
  <text x="762" y="422" text-anchor="end" fill="#D1DCE6" font-size="10">mtdprep.co.uk</text>
</svg>
