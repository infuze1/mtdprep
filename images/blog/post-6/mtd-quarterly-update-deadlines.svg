<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="420" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="60" fill="#2A8A6E"/>
  <text x="30" y="38" font-size="22" fill="#FFFFFF" font-weight="600">Making Tax Digital: Your Five Yearly Dates</text>

  <!-- Row of 4 quarterly pills -->
  <g>
    <rect x="50" y="100" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
    <rect x="70" y="118" width="120" height="30" rx="15" fill="#2A8A6E"/>
    <text x="130" y="139" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">7 August</text>
    <text x="130" y="175" font-size="12" fill="#4A5568" text-anchor="middle">Quarterly update 1</text>
    <text x="130" y="196" font-size="11" fill="#4A5568" text-anchor="middle">Apr &#8211; Jun period</text>
  </g>

  <g>
    <rect x="220" y="100" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
    <rect x="230" y="118" width="140" height="30" rx="15" fill="#2A8A6E"/>
    <text x="300" y="139" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">7 November</text>
    <text x="300" y="175" font-size="12" fill="#4A5568" text-anchor="middle">Quarterly update 2</text>
    <text x="300" y="196" font-size="11" fill="#4A5568" text-anchor="middle">Jul &#8211; Sep period</text>
  </g>

  <g>
    <rect x="390" y="100" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
    <rect x="400" y="118" width="140" height="30" rx="15" fill="#2A8A6E"/>
    <text x="470" y="139" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">7 February</text>
    <text x="470" y="175" font-size="12" fill="#4A5568" text-anchor="middle">Quarterly update 3</text>
    <text x="470" y="196" font-size="11" fill="#4A5568" text-anchor="middle">Oct &#8211; Dec period</text>
  </g>

  <g>
    <rect x="560" y="100" width="160" height="120" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
    <rect x="580" y="118" width="120" height="30" rx="15" fill="#2A8A6E"/>
    <text x="640" y="139" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">7 May</text>
    <text x="640" y="175" font-size="12" fill="#4A5568" text-anchor="middle">Quarterly update 4</text>
    <text x="640" y="196" font-size="11" fill="#4A5568" text-anchor="middle">Jan &#8211; Mar period</text>
  </g>

  <!-- Final declaration banner -->
  <rect x="50" y="260" width="670" height="90" rx="8" fill="#E8F5F1" stroke="#1F6E57" stroke-width="2"/>
  <rect x="75" y="280" width="180" height="34" rx="17" fill="#1F6E57"/>
  <text x="165" y="303" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="600">31 January</text>
  <text x="480" y="298" font-size="15" fill="#1F6E57" text-anchor="middle" font-weight="600">Year-end final declaration</text>
  <text x="480" y="320" font-size="12" fill="#2C3E50" text-anchor="middle">Replaces the old Self Assessment deadline</text>

  <text x="770" y="402" font-size="10" fill="#D1DCE6" text-anchor="end">mtdprep.co.uk</text>
</svg>
