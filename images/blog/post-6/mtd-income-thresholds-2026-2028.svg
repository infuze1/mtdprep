<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="460" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="60" fill="#2A8A6E"/>
  <text x="30" y="38" font-size="22" fill="#FFFFFF" font-weight="600">MTD Income Thresholds, 2026&#8211;2028</text>

  <!-- Timeline line -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="#B7C4D1" stroke-width="4"/>

  <!-- Node 1 -->
  <circle cx="160" cy="150" r="10" fill="#2A8A6E"/>
  <rect x="90" y="90" width="140" height="34" rx="17" fill="#2A8A6E"/>
  <text x="160" y="112" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="600">April 2026</text>
  <rect x="60" y="180" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <text x="160" y="212" font-size="17" fill="#1F6E57" text-anchor="middle" font-weight="700">Over &#163;50,000</text>
  <text x="160" y="236" font-size="12" fill="#4A5568" text-anchor="middle">qualifying income</text>
  <text x="160" y="268" font-size="13" fill="#2C3E50" text-anchor="middle">Based on 2024&#8211;25</text>
  <text x="160" y="288" font-size="13" fill="#2C3E50" text-anchor="middle">tax year income</text>
  <text x="160" y="316" font-size="14" fill="#1A6FA8" text-anchor="middle" font-weight="600">~780,000 people</text>

  <!-- Node 2 -->
  <circle cx="400" cy="150" r="10" fill="#2A8A6E"/>
  <rect x="330" y="90" width="140" height="34" rx="17" fill="#2A8A6E"/>
  <text x="400" y="112" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="600">April 2027</text>
  <rect x="300" y="180" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <text x="400" y="212" font-size="17" fill="#1F6E57" text-anchor="middle" font-weight="700">Over &#163;30,000</text>
  <text x="400" y="236" font-size="12" fill="#4A5568" text-anchor="middle">qualifying income</text>
  <text x="400" y="268" font-size="13" fill="#2C3E50" text-anchor="middle">Based on 2025&#8211;26</text>
  <text x="400" y="288" font-size="13" fill="#2C3E50" text-anchor="middle">tax year income</text>
  <text x="400" y="316" font-size="14" fill="#1A6FA8" text-anchor="middle" font-weight="600">+970,000 people</text>

  <!-- Node 3 -->
  <circle cx="640" cy="150" r="10" fill="#2A8A6E"/>
  <rect x="570" y="90" width="140" height="34" rx="17" fill="#2A8A6E"/>
  <text x="640" y="112" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="600">April 2028</text>
  <rect x="540" y="180" width="200" height="150" rx="8" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <text x="640" y="212" font-size="17" fill="#1F6E57" text-anchor="middle" font-weight="700">Over &#163;20,000</text>
  <text x="640" y="236" font-size="12" fill="#4A5568" text-anchor="middle">qualifying income</text>
  <text x="640" y="268" font-size="13" fill="#2C3E50" text-anchor="middle">Based on 2026&#8211;27</text>
  <text x="640" y="288" font-size="13" fill="#2C3E50" text-anchor="middle">tax year income</text>
  <text x="640" y="316" font-size="14" fill="#1A6FA8" text-anchor="middle" font-weight="600">+500,000 people</text>

  <!-- Total banner -->
  <rect x="60" y="352" width="680" height="60" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1"/>
  <text x="400" y="388" font-size="16" fill="#1F6E57" text-anchor="middle" font-weight="600">~2.25 million sole traders and landlords in scope by 2028</text>

  <text x="770" y="444" font-size="10" fill="#D1DCE6" text-anchor="end">mtdprep.co.uk</text>
</svg>
