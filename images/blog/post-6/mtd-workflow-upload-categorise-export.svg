<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="380" fill="#F8FAFC"/>
  <rect x="0" y="0" width="900" height="60" fill="#2A8A6E"/>
  <text x="30" y="38" font-size="22" fill="#FFFFFF" font-weight="600">From Bank Statement to MTD-Ready Export</text>

  <!-- Step 1 -->
  <rect x="50" y="130" width="230" height="170" rx="10" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="165" cy="170" r="24" fill="#2A8A6E"/>
  <text x="165" y="178" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="700">1</text>
  <rect x="105" y="205" width="120" height="70" rx="6" fill="#F8FAFC" stroke="#B7C4D1" stroke-width="2"/>
  <text x="165" y="235" font-size="11" fill="#4A5568" text-anchor="middle">PDF</text>
  <text x="165" y="252" font-size="11" fill="#4A5568" text-anchor="middle">statement</text>
  <text x="165" y="292" font-size="15" fill="#2C3E50" text-anchor="middle" font-weight="600">Upload</text>

  <!-- Arrow 1 -->
  <line x1="285" y1="215" x2="335" y2="215" stroke="#2A8A6E" stroke-width="4"/>
  <polygon points="335,207 350,215 335,223" fill="#2A8A6E"/>

  <!-- Step 2 -->
  <rect x="355" y="130" width="230" height="170" rx="10" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="470" cy="170" r="24" fill="#2A8A6E"/>
  <text x="470" y="178" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="700">2</text>
  <rect x="400" y="205" width="140" height="70" rx="6" fill="#F8FAFC" stroke="#B7C4D1" stroke-width="2"/>
  <text x="470" y="230" font-size="11" fill="#4A5568" text-anchor="middle">Motor · Office</text>
  <text x="470" y="246" font-size="11" fill="#4A5568" text-anchor="middle">Repairs · Fees</text>
  <text x="470" y="262" font-size="11" fill="#4A5568" text-anchor="middle">HMRC categories</text>
  <text x="470" y="292" font-size="15" fill="#2C3E50" text-anchor="middle" font-weight="600">AI Categorises</text>

  <!-- Arrow 2 -->
  <line x1="590" y1="215" x2="640" y2="215" stroke="#2A8A6E" stroke-width="4"/>
  <polygon points="640,207 655,215 640,223" fill="#2A8A6E"/>

  <!-- Step 3 -->
  <rect x="660" y="130" width="230" height="170" rx="10" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <circle cx="775" cy="170" r="24" fill="#2A8A6E"/>
  <text x="775" y="178" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="700">3</text>
  <rect x="705" y="205" width="140" height="70" rx="6" fill="#F8FAFC" stroke="#B7C4D1" stroke-width="2"/>
  <text x="775" y="235" font-size="11" fill="#4A5568" text-anchor="middle">123 Sheets</text>
  <text x="775" y="251" font-size="11" fill="#4A5568" text-anchor="middle">Absolute · VT</text>
  <text x="775" y="292" font-size="15" fill="#2C3E50" text-anchor="middle" font-weight="600">Export</text>

  <text x="870" y="362" font-size="10" fill="#D1DCE6" text-anchor="end">mtdprep.co.uk</text>
</svg>
