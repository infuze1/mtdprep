<svg viewBox="0 0 800 370" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',Arial,sans-serif;background:#F8FAFC;">
  <title>Digital link diagram showing how spreadsheet records flow to HMRC through bridging software</title>
  <rect width="800" height="370" fill="#F8FAFC"/>
  <rect x="0" y="0" width="800" height="64" fill="#2A8A6E"/>
  <text x="400" y="26" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="1.5">THE DIGITAL LINK REQUIREMENT</text>
  <text x="400" y="48" text-anchor="middle" fill="#B2DFCF" font-size="16" font-weight="700">How records must flow from spreadsheet to HMRC</text>

  <rect x="30" y="90" width="230" height="160" rx="12" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <rect x="125" y="108" width="40" height="30" fill="none" stroke="#2A8A6E" stroke-width="1.5"/>
  <line x1="125" y1="118" x2="165" y2="118" stroke="#2A8A6E" stroke-width="1.5"/>
  <line x1="125" y1="128" x2="165" y2="128" stroke="#2A8A6E" stroke-width="1.5"/>
  <line x1="145" y1="108" x2="145" y2="138" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="145" y="168" text-anchor="middle" fill="#2C3E50" font-size="14" font-weight="700">Your spreadsheet</text>
  <text x="145" y="188" text-anchor="middle" fill="#4A5568" font-size="11">Excel or Google Sheets</text>
  <text x="145" y="204" text-anchor="middle" fill="#4A5568" font-size="11">Each transaction entered</text>
  <text x="145" y="220" text-anchor="middle" fill="#4A5568" font-size="11">once, in full detail</text>

  <text x="280" y="84" text-anchor="middle" fill="#2A8A6E" font-size="11" font-weight="700">Digital link</text>
  <polygon points="260,170 282,158 282,148 300,170 282,192 282,182" fill="#2A8A6E"/>

  <rect x="300" y="90" width="230" height="160" rx="12" fill="#2A8A6E"/>
  <text x="415" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="700">Bridging software</text>
  <text x="415" y="152" text-anchor="middle" fill="#E8F5F1" font-size="11">123 Sheets</text>
  <text x="415" y="170" text-anchor="middle" fill="#E8F5F1" font-size="11">Absolute Excel</text>
  <text x="415" y="188" text-anchor="middle" fill="#E8F5F1" font-size="11">VT</text>
  <text x="415" y="216" text-anchor="middle" fill="#B2DFCF" font-size="11">Reads figures and formats</text>
  <text x="415" y="232" text-anchor="middle" fill="#B2DFCF" font-size="11">them for HMRC's API</text>

  <text x="555" y="84" text-anchor="middle" fill="#1A6FA8" font-size="11" font-weight="700">MTD API</text>
  <polygon points="535,170 557,158 557,148 575,170 557,192 557,182" fill="#1A6FA8"/>

  <rect x="580" y="90" width="190" height="160" rx="12" fill="white" stroke="#1A6FA8" stroke-width="2"/>
  <circle cx="675" cy="122" r="16" fill="#1A6FA8"/>
  <polyline points="667,122 673,128 685,114" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="675" y="168" text-anchor="middle" fill="#2C3E50" font-size="14" font-weight="700">HMRC</text>
  <text x="675" y="188" text-anchor="middle" fill="#4A5568" font-size="11">Quarterly update</text>
  <text x="675" y="204" text-anchor="middle" fill="#4A5568" font-size="11">received via API</text>
  <text x="675" y="220" text-anchor="middle" fill="#4A5568" font-size="11">No manual entry</text>

  <rect x="90" y="272" width="620" height="56" rx="8" fill="white" stroke="#4A5568" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="120" cy="300" r="14" fill="#F8FAFC" stroke="#4A5568" stroke-width="2"/>
  <line x1="112" y1="292" x2="128" y2="308" stroke="#4A5568" stroke-width="2.5"/>
  <line x1="128" y1="292" x2="112" y2="308" stroke="#4A5568" stroke-width="2.5"/>
  <text x="150" y="295" fill="#2C3E50" font-size="12" font-weight="700">Not a digital link:</text>
  <text x="150" y="312" fill="#4A5568" font-size="11">typing totals from a bank statement into a spreadsheet by hand</text>

  <text x="768" y="358" text-anchor="end" fill="#D1DCE6" font-size="10">mtdprep.co.uk</text>
</svg>
