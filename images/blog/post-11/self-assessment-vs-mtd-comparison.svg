  <text x="210" y="120" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="700">Before MTD</text>
  <text x="210" y="180" text-anchor="middle" fill="#2C3E50" font-size="15" font-weight="600">One Self Assessment return</text>
  <text x="210" y="204" text-anchor="middle" fill="#4A5568" font-size="13">filed once a year</text>
  <rect x="170" y="230" width="80" height="100" rx="6" fill="#F8FAFC" stroke="#4A5568" stroke-width="2"/>
  <rect x="184" y="248" width="52" height="7" rx="3" fill="#D1DCE6"/>
