  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="700">What changes under Making Tax Digital</text>
  <rect x="50" y="90" width="320" height="310" rx="10" fill="#FFFFFF" stroke="#D1DCE6" stroke-width="2"/>
  <rect x="50" y="90" width="320" height="46" rx="10" fill="#4A5568"/>
