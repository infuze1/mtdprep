  <text x="590" y="172" text-anchor="middle" fill="#2C3E50" font-size="15" font-weight="600">Four quarterly updates</text>
  <text x="590" y="194" text-anchor="middle" fill="#4A5568" font-size="13">plus one Final Declaration</text>
