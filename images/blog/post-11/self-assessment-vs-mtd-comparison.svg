  <text x="210" y="372" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">31 January</text>
  <rect x="430" y="90" width="320" height="310" rx="10" fill="#FFFFFF" stroke="#2A8A6E" stroke-width="2"/>
  <rect x="430" y="90" width="320" height="46" rx="10" fill="#2A8A6E"/>
