  <text x="493" y="250" text-anchor="middle" fill="#1F6E57" font-size="13" font-weight="700">Q1</text>
  <text x="553" y="250" text-anchor="middle" fill="#1F6E57" font-size="13" font-weight="700">Q2</text>
  <text x="613" y="250" text-anchor="middle" fill="#1F6E57" font-size="13" font-weight="700">Q3</text>
