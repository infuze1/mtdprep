<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>MTDPrep workflow: upload bank statement, AI categorises expenses, export for MTD bridging software</title>
  <desc>Three-step horizontal workflow showing how MTDPrep converts an HSBC PDF bank statement into an MTD-ready export via AI categorisation</desc>
  <rect width="900" height="360" fill="#F8FAFC"/>
  <rect width="900" height="56" fill="#2A8A6E"/>
  <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="white">From Bank Statement to MTD-Ready in Three Steps</text>
  <rect x="50" y="90" width="220" height="220" rx="10" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <circle cx="160" cy="120" r="22" fill="#2A8A6E"/>
  <text x="160" y="127" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="white">1</text>
  <rect x="120" y="150" width="80" height="96" rx="6" fill="#F8FAFC" stroke="#D1DCE6" stroke-width="1.5"/>
  <rect x="120" y="150" width="80" height="28" rx="6" fill="#1A6FA8"/>
  <text x="160" y="169" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white">PDF</text>
  <rect x="130" y="188" width="50" height="5" rx="2" fill="#D1DCE6"/>
  <rect x="130" y="200" width="40" height="5" rx="2" fill="#D1DCE6"/>
  <rect x="130" y="212" width="55" height="5" rx="2" fill="#D1DCE6"/>
