<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Making Tax Digital Income Tax mandate thresholds 2026 to 2028</title>
  <desc>Timeline showing MTD ITSA mandate rollout: April 2026 for income over £50,000, April 2027 for over £30,000, April 2028 for over £20,000, with estimated numbers affected</desc>
  <rect width="800" height="380" fill="#F8FAFC"/>
  <rect width="800" height="56" fill="#2A8A6E"/>
  <text x="400" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="white">MTD for Income Tax — Who's Mandated and When?</text>
  <text x="400" y="48" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">(Sole traders and landlords — gross income from self-employment and property combined)</text>
  <line x1="100" y1="190" x2="700" y2="190" stroke="#D1DCE6" stroke-width="3"/>
  <polygon points="700,183 718,190 700,197" fill="#D1DCE6"/>
  <circle cx="180" cy="190" r="14" fill="#2A8A6E"/>
  <text x="180" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white">NOW</text>
  <rect x="126" y="215" width="108" height="26" rx="13" fill="#2A8A6E"/>
  <text x="180" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="white">April 2026</text>
  <rect x="120" y="250" width="120" height="38" rx="6" fill="white" stroke="#2A8A6E" stroke-width="2"/>
  <text x="180" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#2A8A6E">£50,000+</text>
  <text x="180" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">gross income</text>
  <text x="180" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C3E50" font-weight="600">~780,000</text>
  <text x="180" y="329" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">people affected</text>
  <rect x="146" y="338" width="68" height="18" rx="9" fill="#2A8A6E"/>
  <text x="180" y="351" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="600">LIVE NOW</text>
  <line x1="180" y1="204" x2="180" y2="215" stroke="#2A8A6E" stroke-width="1.5"/>
  <circle cx="400" cy="190" r="14" fill="#1A6FA8"/>
  <text x="400" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white">2027</text>
  <rect x="346" y="215" width="108" height="26" rx="13" fill="#1A6FA8"/>
  <text x="400" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="white">April 2027</text>
  <rect x="340" y="250" width="120" height="38" rx="6" fill="white" stroke="#1A6FA8" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1A6FA8">£30,000+</text>
  <text x="400" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">gross income</text>
  <text x="400" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C3E50" font-weight="600">+970,000</text>
  <text x="400" y="329" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">more people</text>
  <rect x="366" y="338" width="68" height="18" rx="9" fill="#1A6FA8"/>
  <text x="400" y="351" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="600">COMING SOON</text>
  <line x1="400" y1="204" x2="400" y2="215" stroke="#1A6FA8" stroke-width="1.5"/>
  <circle cx="620" cy="190" r="14" fill="#4A5568"/>
  <text x="620" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="white">2028</text>
  <rect x="566" y="215" width="108" height="26" rx="13" fill="#4A5568"/>
  <text x="620" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="white">April 2028</text>
  <rect x="560" y="250" width="120" height="38" rx="6" fill="white" stroke="#4A5568" stroke-width="2"/>
  <text x="620" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#4A5568">£20,000+</text>
  <text x="620" y="282" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">gross income</text>
  <text x="620" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2C3E50" font-weight="600">+500,000</text>
  <text x="620" y="329" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4A5568">more people</text>
  <rect x="581" y="338" width="78" height="18" rx="9" fill="#4A5568"/>
  <text x="620" y="351" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" font-weight="600">PLANNED 2028</text>
  <line x1="620" y1="204" x2="620" y2="215" stroke="#4A5568" stroke-width="1.5"/>
  <rect x="270" y="80" width="260" height="54" rx="8" fill="#E8F5F1" stroke="#2A8A6E" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1F6E57">~2.25 million sole traders</text>
  <text x="400" y="124" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4A5568">and landlords in scope by 2028</text>
  <text x="790" y="374" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#D1DCE6">mtdprep.co.uk</text>
</svg>
